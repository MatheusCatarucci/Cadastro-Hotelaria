<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Cadastro</title>
</head>

<body>
    <div class="main">
        <div class="container">

            <div class="container-top">
                <h1>Cadastro de Hóspede</h1>
            </div>

            <div class="hr"></div>

            <div class="container-bottom">
                <h2>Preencha os dados abaixo</h2>
            </div>

            <div class="formulario">
                <form action="/cadastro" method="post">
                    <div class="input-group">
                        <label>Nome:</label>
                        <input type="text" name="nome" placeholder="Digite o nome">
                    </div>

                    <div class="input-group">
                        <label>Email:</label>
                        <input type="email" name="email" placeholder="Digite o email">
                    </div>

                    <div class="input-group">
                        <label>Telefone:</label>
                        <input type="text" name="telefone" placeholder="Digite o telefone">
                    </div>

                    <div class="input-group">
                        <label>CPF:</label>
                        <input type="text" name="cpf" placeholder="Digite o CPF">
                    </div>

                    <div class="botoes">
                        <button type="submit" id="botao-cadastro">Cadastrar</button>
                        <a href="/dashboard">Ver dados</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>

</html>
