<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Cadastro — Hotel</title>
</head>

<body>
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="hotel-name">Grand Hôtel</span>
                <span class="hotel-sub">Sistema de Gestão</span>
            </div>

            <div class="sidebar-divider"></div>

            <nav class="sidebar-nav">
                <span class="nav-label">Menu</span>

                <a href="/" class="nav-item active">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                    Cadastro
                </a>

                <a href="/hospedes" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Hóspedes
                </a>
                <a href="/adm" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z" />
                    </svg>
                    ADM
                </a>
            </nav>

            <div class="sidebar-footer">
                Hotelaria v1.1.1
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <div class="page-header">
                <span class="eyebrow">Recepção</span>
                <h1>Novo Hóspede</h1>
                <div class="gold-line"></div>
                <p>Preencha os dados abaixo para registrar um novo hóspede.</p>
            </div>

            {% if flash %}
            <div class="flash {{ flash.type }}">
                {{ flash.msg }}
            </div>
            {% endif %}

            <div class="card">
                <p class="card-title">Dados Pessoais</p>

                <form action="/cadastro" method="post">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" required>
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="email@dominio.com">
                        </div>

                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" name="telefone" placeholder="(19) 9 9999-9999">
                        </div>

                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                        </div>

                        <div class="btn-row">
                            <button type="submit" class="btn-primary">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 5v14M5 12h14" />
                                </svg>
                                Registrar Hóspede
                            </button>
                            <a href="/hospedes" class="btn-ghost">Ver lista</a>
                        </div>
                    </div>
                </form>
            </div>

        </main>
    </div>
</body>

</html>
