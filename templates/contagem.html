<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="shortcut icon" href="/static/assets/img/logo branca.ico" type="image/x-icon">
    <title>Cadastro — Hotel</title>
</head>

<body>
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="hotel-name">Grand Hôtel</span>
                <span class="hotel-sub">Sistema de Gestão</span>
            </div>

            <div class="sidebar-divider"></div>

            <nav class="sidebar-nav">
                <span class="nav-label">Menu</span>

                <a href="/" class="nav-item active">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                    Cadastro
                </a>

                <a href="/hospedes" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Hóspedes
                </a>
                <a href="/dashboard-adm" class="nav-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z" />
                    </svg>
                    ADM
                </a>
            </nav>

            <div class="sidebar-footer">
                Hotelaria v1.2
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <div class="page-header">
                <span class="eyebrow">Recepção</span>
                <h1>Contagem de hospedes</h1>
                <div class="gold-line"></div>
                <p>Informacoes detalhadas de ontagem.</p>
            </div>

            {% if flash %}
            <div class="flash {{ flash.type }}">
                {{ flash.msg }}
            </div>
            {% endif %}

            <div class="card">
                <p class="card-title">Contagem de hospedes</p>
                <h1>{{contagem|length}} hospedes</h1>
            </div>

        </main>
    </div>
</body>

</html>
